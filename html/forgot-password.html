<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Expense</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="forgot-container">

        <div class="forgot-box">

            <h1>Reset Password</h1>

            <p class="forgot-text">
                Enter your registered Email or Username and create a new password.
            </p>

            <form id="forgotPasswordForm">

                <input
                    type="text"
                    id="forgotUser"
                    placeholder="Email or Username"
                    required
                >

                <input
                    type="password"
                    id="newPassword"
                    placeholder="New Password"
                    required
                >

                <input
                    type="password"
                    id="confirmNewPassword"
                    placeholder="Confirm New Password"
                    required
                >

                <button type="submit">
                    Reset Password
                </button>

            </form>

            <div class="forgot-links">

                <a href="login.html">
                    ← Back to Login
                </a>

                <a href="register.html">
                    Create New Account
                </a>

            </div>

        </div>

    </div>

    <script src="../js/auth.js"></script>

</body>

</html>
