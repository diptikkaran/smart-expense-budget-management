<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Expense</title>

    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="login-container">

        <div class="login-box">

            <h1>Login</h1>

            <form>

                <input
                    type="text"
                    placeholder="Email or Username"
                    required
                >

                <input
                    type="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <div class="login-links">

                <a href="#">
                    Forgot Password?
                </a>

                <a href="register.html">
                    Create Account
                </a>

            </div>

        </div>

    </div>

</body>
</html>
